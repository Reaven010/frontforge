<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Login Interface</title>

<style>
/* ================= BACKGROUND ================= */
body{
    margin:0;
    height:100vh;
    display:flex;
    justify-content:center;
    align-items:center;
    font-family:Arial, sans-serif;
    background-size:cover;
    background-position:center;
}

#bg-video{
    position: fixed;
    top: 0;
    left: 0;
    width: 100%;
    height: 100%;
    object-fit: cover;
    z-index: -2;
}

/* ================= LOGIN CARD ================= */
.login-box{
    width:320px;
    padding:40px;
    text-align:center;
    border-radius:12px;
    background:rgba(255,255,255,0.08);
    backdrop-filter:blur(12px);
    box-shadow:0 0 20px rgba(0,0,0,0.6);
    color:white;
}

/* ================= WELCOME HEADING ================= */
.login-box h2{
    margin-bottom:25px;
    font-size:26px;
    overflow:hidden;
    white-space:nowrap;
    border-right:3px solid white;
    width:0;
    display:inline-block;
    
    /* Gradient text */
    background:linear-gradient(90deg, orange, red, orange);
    background-size:200%;
    -webkit-background-clip:text;
    color:transparent;

    animation:
        typing 3s steps(30) forwards,
        blink 0.7s infinite,
        gradientMove 3s linear infinite,
        glow 2s ease-in-out infinite alternate;
}

/* ================= INPUTS ================= */
.input-box{
    width:100%;
    padding:12px;
    margin:8px 0;
    border:none;
    outline:none;
    border-radius:6px;
    background:rgba(255,255,255,0.15);
    color:white;
    /* Ensure padding doesn't increase width */
    box-sizing: border-box; 
}

.input-box::placeholder{
    color:#ddd;
}

/* ================= BUTTON ================= */
.login-btn{
    width:100%;
    padding:12px;
    margin-top:12px;
    border:none;
    border-radius:6px;
    background:#0095f6;
    color:white;
    font-weight:bold;
    cursor:pointer;
    transition:0.3s;
}

.login-btn:hover{
    background:#0077cc;
}

/* ================= LINKS ================= */
.forgot{
    margin-top:15px;
    font-size:14px;
    color:#ccc;
    cursor:pointer;
}

.signup{
    margin-top:20px;
    font-size:14px;
}

.signup span{
    color:#0095f6;
    cursor:pointer;
}

/* ================= ANIMATIONS ================= */
@keyframes typing{
    from{ width:0 }
    to{ width:100% }
}
@keyframes blink{
    50%{ border-color:transparent }
}
@keyframes gradientMove{
    from{ background-position:0% }
    to{ background-position:200% }
}
@keyframes glow{
    from{ text-shadow:0 0 5px orange; }
    to{ text-shadow:0 0 25px red; }
}
</style>
</head>

<body>
<video autoplay muted loop id="bg-video">
    <source src="./videoplayback.mp4" type="video/mp4">
</video>
<div class="login-box">

    <h2>Welcome to our website</h2>

    <input type="text" class="input-box" placeholder="Phone number, username, or email">
    <input type="password" class="input-box" placeholder="Password">

    <button class="login-btn" onclick="login()">Log in</button>

    <div class="forgot">Forgot password?</div>

    <div class="signup">
        Don't have an account? <span>Sign up</span>
    </div>

</div>

<script>
    async function login() {
    const email = document.querySelectorAll(".input-box")[0].value;
    const password = document.querySelectorAll(".input-box")[1].value;

    const res = await fetch("http://localhost:5000/login", {
        method: "POST",
        headers: {
            "Content-Type": "application/json"
        },
        body: JSON.stringify({ email, password })
    });

    const data = await res.json();

    if (data.token) {
        localStorage.setItem("token", data.token);
        window.location.href = "index_main.html";
    } else {
        alert("Login failed");
    }
}
</script>

</body>
</html>
